# ISIC2019 Active Learning config template
# Update MODEL.NUM_CLASSES and DATASET.ROOT_DIR before running.

RNG_SEED: 1

DATASET:
  NAME: ISIC2019
  ROOT_DIR: './data/isic2019'
  VAL_RATIO: 0.1
  AUG_METHOD: 'hflip'

MODEL:
  TYPE: resnet18
  NUM_CLASSES: 8

OPTIM:
  TYPE: 'sgd'
  BASE_LR: 0.01
  LR_POLICY: cos
  LR_MULT: 0.1
  MAX_EPOCH: 100
  MOMENTUM: 0.9
  NESTEROV: True
  WEIGHT_DECAY: 0.0003
  GAMMA: 0.1

TRAIN:
  SPLIT: train
  BATCH_SIZE: 64
  IM_SIZE: 224
  EVAL_PERIOD: 2

TEST:
  SPLIT: test
  BATCH_SIZE: 128
  IM_SIZE: 224

DATA_LOADER:
  NUM_WORKERS: 4

CUDNN:
  BENCHMARK: True

ACTIVE_LEARNING:
  INIT_L_RATIO: 0.
  MAX_ITER: 5
  FINE_TUNE: False
  DELTA_RESOLUTION: 0.05
  MAX_DELTA: 1.1
