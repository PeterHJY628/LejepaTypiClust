# EXP_NAME: 'YOUR_EXPERIMENT_NAME'
RNG_SEED: 1

DATASET:
  NAME: ISIC2019
  ROOT_DIR: './data/isic2019'
  VAL_RATIO: 0.1
  AUG_METHOD: 'hflip'

MODEL:
  TYPE: resnet18
  NUM_CLASSES: 8

OPTIM:
  TYPE: 'sgd'
  BASE_LR: 0.01
  LR_POLICY: cos
  LR_MULT: 0.1
  # STEPS: [0, 30, 60, 90]
  MAX_EPOCH: 100
  MOMENTUM: 0.9
  NESTEROV: True
  WEIGHT_DECAY: 0.0003
  GAMMA: 0.1

TRAIN:
  SPLIT: train
  BATCH_SIZE: 64
  IM_SIZE: 224
  EVAL_PERIOD: 2

TEST:
  SPLIT: test
  BATCH_SIZE: 128
  IM_SIZE: 224

DATA_LOADER:
  NUM_WORKERS: 4

CUDNN:
  BENCHMARK: True
