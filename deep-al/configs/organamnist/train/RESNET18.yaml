RNG_SEED: 1

DATASET:
  NAME: ORGANAMNIST
  ROOT_DIR: './data/medmnist'
  VAL_RATIO: 0.1
  AUG_METHOD: 'hflip'

MODEL:
  TYPE: resnet18
  NUM_CLASSES: 11

OPTIM:
  TYPE: 'sgd'
  BASE_LR: 0.025
  LR_POLICY: cos
  LR_MULT: 0.1
  MAX_EPOCH: 200
  MOMENTUM: 0.9
  NESTEROV: True
  WEIGHT_DECAY: 0.0003
  GAMMA: 0.1

TRAIN:
  SPLIT: train
  BATCH_SIZE: 128
  IM_SIZE: 28
  EVAL_PERIOD: 2

TEST:
  SPLIT: test
  BATCH_SIZE: 256
  IM_SIZE: 28

DATA_LOADER:
  NUM_WORKERS: 4

CUDNN:
  BENCHMARK: True
